name: Test5
on:
  workflow_dispatch:
    inputs:
      timesteps:
        description: "Steps"
        required: false
        default: "500000"
jobs:
  train:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: gen9randombattle
            team_format: ""
          - format: gen9ou
            team_format: gen9ou
    steps:
      - name: Train ${{ matrix.format }}
        run: |
          ARGS="--format ${{ matrix.format }} --timesteps ${{ inputs.timesteps }}"
          if [ -n "${{ matrix.team_format }}" ]; then
            ARGS="$ARGS --team-format ${{ matrix.team_format }}"
          fi
          echo $ARGS
        env:
          PYTHONUNBUFFERED: "1"
  package:
    needs: train
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - run: echo "packaging"
