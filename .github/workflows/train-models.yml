name: Train ML Models

on:
  workflow_dispatch:
    inputs:
      timesteps:
        description: "Training steps per format"
        required: false
        default: "500000"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: gen9randombattle
            team_format: ""
          - format: gen9ou
            team_format: gen9ou
          - format: gen9doublesou
            team_format: gen9doublesou
          - format: gen9nationaldex
            team_format: gen9nationaldex
          - format: gen9monotype
            team_format: gen9monotype
          - format: gen9anythinggoes
            team_format: gen9anythinggoes
          - format: gen7randombattle
            team_format: ""
          - format: gen6randombattle
            team_format: ""
          - format: gen9vgc2026regi
            team_format: gen9vgc2026regi
          - format: gen9vgc2026regf
            team_format: gen9vgc2026regf

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install stable-baselines3>=2.2.0 tensorboard>=2.16.0 poke-env>=0.8.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Start Pokemon Showdown server
        run: |
          git clone --depth 1 https://github.com/smogon/pokemon-showdown.git /tmp/showdown
          cd /tmp/showdown
          node pokemon-showdown start --no-security > /tmp/showdown.log 2>&1 &
          SHOWDOWN_PID=$!
          for i in $(seq 1 30); do
            nc -z localhost 8000 && echo "Showdown ready after ${i}x3s" && break
            if ! kill -0 $SHOWDOWN_PID 2>/dev/null; then
              echo "Showdown process died! Log:" && cat /tmp/showdown.log && exit 1
            fi
            echo "Waiting... ($i/30)" && sleep 3
          done
          nc -z localhost 8000 || { echo "Showdown never started. Log:"; cat /tmp/showdown.log; exit 1; }

      - name: Train ${{ matrix.format }}
        run: |
          ARGS="--format ${{ matrix.format }} --timesteps ${{ github.event.inputs.timesteps }} --save-dir data/ml/policy"
          if [ -n "${{ matrix.team_format }}" ]; then
            ARGS="$ARGS --team-format ${{ matrix.team_format }}"
          fi
          python -m src.ml.train_policy $ARGS
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload model
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: model-${{ matrix.format }}
          path: data/ml/policy/${{ matrix.format }}/final_model.zip
          if-no-files-found: warn
          retention-days: 90

  package:
    needs: train
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all models
        uses: actions/download-artifact@v8
        with:
          pattern: model-*
          path: all-models
          merge-multiple: false

      - name: List models
        run: find all-models -name "*.zip" | sort

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: all-models
          path: all-models/
          retention-days: 90
