name: Train ML Models

on:
  workflow_dispatch:
    inputs:
      timesteps:
        description: "Training steps per format (manual production runs only — CI uses matrix.timesteps)"
        required: false
        default: "500000"

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: gen9randombattle
            team_format: ""
            timesteps: 100000
          - format: gen9ou
            team_format: gen9ou
            timesteps: 100000
          - format: gen9doublesou
            team_format: gen9doublesou
            timesteps: 50000
          - format: gen9nationaldex
            team_format: gen9nationaldex
            timesteps: 100000
          - format: gen9monotype
            team_format: gen9monotype
            timesteps: 100000
          - format: gen9anythinggoes
            team_format: gen9anythinggoes
            timesteps: 100000
          - format: gen9vgc2026regi
            team_format: gen9vgc2026regi
            timesteps: 50000
          - format: gen9vgc2026regf
            team_format: gen9vgc2026regf
            timesteps: 50000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install poke-env==0.12.1
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install stable-baselines3>=2.2.0 tensorboard>=2.16.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: /tmp/showdown/package-lock.json

      - name: Start Pokemon Showdown server
        run: |
          git clone --depth 1 https://github.com/smogon/pokemon-showdown.git /tmp/showdown
          cd /tmp/showdown
          npm install
          node pokemon-showdown start --no-security --max-old-space-size=3000 &

          until curl --output /dev/null --silent --head --fail http://localhost:8000; do
            sleep 0.01
          done

          sleep 1

      - name: Train ${{ matrix.format }}
        timeout-minutes: 60
        run: |
          ARGS="--format ${{ matrix.format }} --timesteps ${{ matrix.timesteps }} --save-dir data/ml/policy"
          if [ -n "${{ matrix.team_format }}" ]; then
            ARGS="$ARGS --team-format ${{ matrix.team_format }}"
          fi
          python -m src.ml.train_policy $ARGS
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload model
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-${{ matrix.format }}
          path: data/ml/policy/${{ matrix.format }}/final_model.zip
          if-no-files-found: warn
          retention-days: 90

  package:
    needs: train
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all models
        uses: actions/download-artifact@v4
        with:
          pattern: model-*
          path: all-models
          merge-multiple: false

      - name: List models
        run: find all-models -name "*.zip" | sort

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-models
          path: all-models/
          retention-days: 90
