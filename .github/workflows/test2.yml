name: Test2
on:
  workflow_dispatch:
    inputs:
      timesteps:
        description: "Steps"
        required: false
        default: "500000"
jobs:
  train:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: gen9randombattle
            team_format: ""
          - format: gen9ou
            team_format: gen9ou
    steps:
      - run: echo "format=${{ matrix.format }} team=${{ matrix.team_format }} steps=${{ inputs.timesteps }}"
  package:
    needs: train
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - run: echo "packaging"
