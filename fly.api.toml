app = "pokemon-draft-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  target = "api"

[env]
  PYTHONUNBUFFERED = "1"
  LOG_LEVEL = "INFO"
  PORT = "8000"

[mounts]
  source = "api_data"
  destination = "/app/data"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    path = "/health"
    method = "GET"
    grace_period = "10s"

[deploy]
  strategy = "rolling"
