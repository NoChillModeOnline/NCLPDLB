{% extends "base.html" %}

{% block title %}Teams - Pokemon Draft League{% endblock %}

{% block content %}
<div class="space-y-8">
    <!-- Page Header -->
    <div class="text-center">
        <h1 class="text-4xl font-bold text-gray-900 mb-2">
            <i class="fas fa-users text-pokemon-blue"></i>
            All Teams
        </h1>
        <p class="text-gray-600">Browse all teams in the league</p>
    </div>

    <!-- Teams Grid -->
    <div id="teams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Loading -->
        <div class="col-span-full text-center py-12">
            <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-pokemon-red mx-auto"></div>
            <p class="text-gray-500 mt-4">Loading teams...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    async function loadTeams() {
        try {
            const response = await fetch('/api/teams/all');
            const data = await response.json();

            const grid = document.getElementById('teams-grid');

            if (data.teams && data.teams.length > 0) {
                grid.innerHTML = data.teams.map(team => `
                    <div class="bg-white rounded-lg shadow-md hover:shadow-xl transition-shadow overflow-hidden">
                        <div class="bg-gradient-to-r from-pokemon-red to-red-700 h-24 flex items-center justify-center">
                            ${team.logo_url ?
                                `<img src="${team.logo_url}" alt="${team.team_name}" class="h-16 w-16 object-contain">` :
                                `<i class="fas fa-shield-alt text-white text-4xl"></i>`
                            }
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold text-gray-900 mb-2">${team.team_name}</h3>
                            <p class="text-gray-600 mb-4">
                                <i class="fas fa-user mr-1"></i> ${team.player}
                            </p>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div class="text-center">
                                    <p class="text-2xl font-bold text-pokemon-blue">${team.pokemon_count}</p>
                                    <p class="text-xs text-gray-500">Pokemon</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-2xl font-bold text-pokemon-yellow">${team.points_used}</p>
                                    <p class="text-xs text-gray-500">Points</p>
                                </div>
                            </div>
                            <div class="flex justify-between items-center text-sm mb-4">
                                <span class="text-green-600 font-semibold">
                                    <i class="fas fa-trophy mr-1"></i> ${team.wins || 0}W
                                </span>
                                <span class="text-red-600 font-semibold">
                                    <i class="fas fa-times mr-1"></i> ${team.losses || 0}L
                                </span>
                            </div>
                            <a href="/team/${team.player}" class="block w-full bg-pokemon-blue text-white text-center py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                                <i class="fas fa-eye mr-2"></i>View Team
                            </a>
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-info-circle text-gray-400 text-6xl mb-4"></i>
                        <p class="text-gray-600 text-lg">No teams registered yet</p>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Error loading teams:', error);
            document.getElementById('teams-grid').innerHTML = `
                <div class="col-span-full text-center py-12">
                    <i class="fas fa-exclamation-triangle text-red-500 text-6xl mb-4"></i>
                    <p class="text-red-600 text-lg">Error loading teams</p>
                    <p class="text-gray-500 mt-2">Please make sure the bot is connected to Google Sheets</p>
                </div>
            `;
        }
    }

    loadTeams();
    setInterval(loadTeams, 60000); // Refresh every minute
</script>
{% endblock %}
